<section
  class="page-header relative py-20 bg-cover bg-center bg-no-repeat overflow-hidden"
  [ngStyle]="{ 'background-image': 'url(' + backgroundImage + ')' }"
>
  <!-- Overlay -->
  <div class="page-header-overlay"></div>

  <!-- Decorative Elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-10 right-20 w-32 h-32 bg-gradient-to-br from-[var(--InnoTech-primary)]/8 to-[var(--InnoTech-secondary)]/8 rounded-full blur-2xl"></div>
    <div class="absolute bottom-10 left-20 w-24 h-24 bg-gradient-to-br from-[var(--InnoTech-accent)]/8 to-[var(--InnoTech-primary)]/8 rounded-full blur-xl"></div>
  </div>

  <!-- Header Content -->
  <div class="container mx-auto px-4 relative z-10 text-center text-white">
    <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-0.5 bg-gradient-to-r from-[var(--InnoTech-primary)] to-[var(--InnoTech-secondary)]"></div>
      <span class="text-sm font-bold text-[var(--InnoTech-secondary)] uppercase tracking-wider">
        {{ subtitle }}
      </span>
      <div class="w-12 h-0.5 bg-gradient-to-r from-[var(--InnoTech-secondary)] to-[var(--InnoTech-primary)]"></div>
    </div>
    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">{{ title }}</h1>
    <p class="text-lg text-white/90 max-w-2xl mx-auto">{{ description }}</p>
  </div>
</section>
