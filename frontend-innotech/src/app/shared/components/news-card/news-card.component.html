<article
  class="group relative bg-white rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-500 overflow-hidden cursor-pointer transform hover:-translate-y-2 border border-gray-100 h-full flex flex-col"
  (click)="onCardClick()"
>
  <!-- Category Badge -->
  <div class="absolute top-4 left-4 z-20">
    <span
      class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-bold text-white backdrop-blur-md shadow-lg"
      [ngClass]="getCategoryBadgeClass()"
    >
      <i [class]="getCategoryIcon()" class="mr-1.5 text-xs"></i>
      {{ getCategoryLabel() | translate }}
    </span>
  </div>

  <!-- Image Container -->
  <div class="relative h-56 overflow-hidden">
    <img
      [src]="getPhotoUrl(news.image_url!) || getDefaultImage()"
      [alt]="news.title"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
      loading="lazy"
    />

    <!-- Enhanced Overlay Gradient -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent opacity-60 group-hover:opacity-40 transition-opacity duration-500"></div>

    <!-- Date Badge -->
    <div class="absolute bottom-4 right-4 z-10" *ngIf="news.event_date">
      <div class="bg-white/90 backdrop-blur-sm rounded-xl px-3 py-2 text-[var(--InnoTech-text)] text-sm font-semibold shadow-lg">
        <i class="pi pi-clock mr-1 text-xs"></i>
        {{ formatDate(news.event_date) }}
      </div>
    </div>

    <!-- Hover Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-[var(--InnoTech-primary)]/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
  </div>

  <!-- Content -->
  <div class="p-6 flex-grow flex flex-col justify-between">

    <!-- Title -->
    <h3 class="text-xl font-bold text-[var(--InnoTech-text)] mb-3 line-clamp-2 group-hover:text-[var(--InnoTech-primary)] transition-colors duration-300 leading-tight">
      {{ news.title }}
    </h3>

    <!-- Description -->
    <p class="text-gray-600 leading-relaxed mb-6 line-clamp-3 text-sm">
      {{ news.description }}
    </p>

    <!-- Footer -->
    <div class="flex items-center justify-between pt-4 border-t border-gray-100">
      <!-- Event Info for events -->
      <div class="flex flex-col gap-1 text-xs text-gray-500" *ngIf="news.category === 'event' && (news.event_date || news.location)">
        <div class="flex items-center gap-1" *ngIf="news.event_date">
          <i class="pi pi-calendar text-[var(--InnoTech-primary)]"></i>
          <span>{{ formatDate(news.event_date) }}</span>
        </div>
        <div class="flex items-center gap-1" *ngIf="news.location">
          <i class="pi pi-map-marker text-[var(--InnoTech-primary)]"></i>
          <span class="whitespace-normal break-words">{{ news.location }}</span>
        </div>
      </div>

      <!-- Empty div for spacing when no event info -->
      <div *ngIf="news.category !== 'event' || (!news.event_date && !news.location)"></div>

      <!-- Read More Button -->
      <div class="flex items-center gap-2 text-[var(--InnoTech-primary)] font-semibold text-sm group-hover:gap-3 transition-all duration-300">
        <span>{{ 'NEWS.READ_MORE' | translate }}</span>
        <i class="pi pi-arrow-right group-hover:translate-x-1 transition-transform duration-300"></i>
      </div>
    </div>
  </div>

  <!-- Decorative Elements -->
  <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-[var(--InnoTech-primary)]/5 to-transparent rounded-bl-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
  <div class="absolute bottom-0 left-0 w-16 h-16 bg-gradient-to-tr from-[var(--InnoTech-secondary)]/5 to-transparent rounded-tr-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
</article>
